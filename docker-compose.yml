services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Lié à 127.0.0.1 : joignable depuis la machine de dev (make dev-api, psql,
    # scripts de migration) mais jamais exposé sur le réseau.
    ports:
      - "127.0.0.1:5435:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rbs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-rbs_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Scripts d'init joués par Postgres à la création de la base, en ordre
      # alphabétique : extensions d'abord, puis le schéma applicatif.
      # Les fichiers sont montés UN PAR UN (et non via le répertoire) car Docker
      # ne peut pas créer un point de montage imbriqué dans un répertoire monté
      # en lecture seule. Ajouter un script ici = ajouter une ligne ici.
      # Le schéma est monté depuis sa source, jamais copié : c'est ce qui rend
      # impossible toute divergence avec le fichier que lit sqlc.
      - ./infra/postgres/init/01-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
      - ./apps/api-go/sql/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rbs} -d ${POSTGRES_DB:-rbs_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Même principe que postgres : accès local seulement.
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api-go:
    image: ghcr.io/cheikh-nakamoto/rbs-crew-api-go:latest
    build:
      context: .
      dockerfile: apps/api-go/Dockerfile
    ports:
      -4000:4000
    restart: unless-stopped
    # Pas de ports exposés sur l'hôte — accessible uniquement via le réseau Docker interne
    # et via les rewrites Next.js (nextjs-web → api-go:4000)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rbs}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-rbs_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # NabooPay — unique moyen de paiement exposé côté site. Sans ces variables
      # le provider n'est pas enregistré et /payments/create-checkout répond 400.
      NABOO_API_KEY: ${NABOO_API_KEY:-}
      NABOO_WEBHOOK_SECRET: ${NABOO_WEBHOOK_SECRET:-}
      NABOO_BASE_URL: ${NABOO_BASE_URL:-}
      # SMTP — sans ces variables aucun e-mail ne part (vérification d'adresse,
      # réinitialisation de mot de passe, invitation artiste, remboursement).
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-RBS Crew <noreply@rbscrew.sn>}
      # Vérification de l'id_token Google côté API (connexion « Continuer avec Google »).
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      API_PORT: 4000
      APP_ENV: ${APP_ENV:-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,https://rbs-crew.cheikhmodiouf.org}
      APP_URL: ${APP_URL:-https://rbs-crew.cheikhmodiouf.org}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-rbs-media}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-https://pub-f89062d997054062a74be2228aba1326.r2.dev}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nextjs-web:
    image: ghcr.io/cheikh-nakamoto/rbs-crew-nextjs-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /backend
        # Variable NEXT_PUBLIC_* : elle doit être injectée AU BUILD, pas au
        # runtime. Sert à construire les URLs de retour envoyées à NabooPay ;
        # sans elle le client est renvoyé vers localhost après paiement.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://rbs-crew.cheikhmodiouf.org}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api-go
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api-go:4000}
      API_REWRITE_TARGET: ${INTERNAL_API_URL:-http://api-go:4000}
      NODE_ENV: ${NODE_ENV:-production}
      # AUTH_URL détermine si le cookie de session porte le flag Secure et le
      # préfixe __Host- : en http:// il en est dépourvu, y compris derrière un
      # nginx en TLS. Doit donc être l'URL PUBLIQUE en https:// en production.
      #
      # AUTH_SECRET n'a volontairement AUCUNE valeur par défaut : un secret
      # présent dans le dépôt permettrait de forger un cookie de session avec le
      # rôle ADMIN. Les deux variables sont validées AU DÉMARRAGE DU SERVICE
      # (apps/web/lib/auth.ts) et non par une interpolation `${VAR:?}` : compose
      # interprète le fichier entier à chaque commande, y compris pour un autre
      # service et y compris pendant un rollback — une variable manquante
      # rendrait alors tout redéploiement ET tout retour arrière impossibles.
      AUTH_URL: ${AUTH_URL:-}
      AUTH_TRUST_HOST: "true"
      AUTH_SECRET: ${AUTH_SECRET:-}
      # Utilisées côté serveur par next-auth uniquement — pas de préfixe NEXT_PUBLIC_.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
  redisdata:
