services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rbs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-rbs_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rbs} -d ${POSTGRES_DB:-rbs_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nestjs-api:
    build:
      context: .
      dockerfile: apps/api-go/Dockerfile
    restart: unless-stopped
    # Pas de ports exposés sur l'hôte — accessible uniquement via le réseau Docker interne
    # et via les rewrites Next.js (nextjs-web → nestjs-api:4000)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rbs}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-rbs_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-jwt-refresh-change-me}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      API_PORT: 4000
      APP_ENV: ${APP_ENV:-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,https://rbs-crew.cheikhmodiouf.org}
      APP_URL: ${APP_URL:-https://rbs-crew.cheikhmodiouf.org}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-rbs-media}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-https://pub-f89062d997054062a74be2228aba1326.r2.dev}

  nextjs-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - nestjs-api
    environment:
      INTERNAL_API_URL: http://nestjs-api:4000
      NODE_ENV: ${NODE_ENV:-production}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      AUTH_SECRET: ${AUTH_SECRET:-super_secret_dev_key_only_123}

volumes:
  pgdata:
  redisdata:
