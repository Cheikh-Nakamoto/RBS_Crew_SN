upstream nextjs {
    server nextjs-web:3000;
    keepalive 32;
}

upstream nestjs {
    server nestjs-api:4000;
    keepalive 32;
}

server {
    listen 80;
    server_name www.domaine.com domaine.com localhost;

    # WordPress legacy URL 301 redirects (from migration map)
    if ($new_uri != "") {
        return 301 $new_uri;
    }

    # Redirect WordPress admin paths to academy subdomain
    location ~* ^/(wp-admin|wp-login\.php|xmlrpc\.php) {
        return 301 https://academy.domaine.com$request_uri;
    }

    # NestJS API — strip /api prefix
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://nestjs/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth endpoints — stricter rate limit
    location ~ ^/api/auth/(login|register|forgot-password) {
        limit_req zone=auth burst=3 nodelay;

        proxy_pass http://nestjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Stripe webhook — no rate limit, larger body
    location = /api/payments/webhook {
        client_max_body_size 1m;

        proxy_pass http://nestjs/payments/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Stripe-Signature $http_stripe_signature;
    }

    # Next.js static assets (aggressive caching)
    location /_next/static/ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=86400";
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
