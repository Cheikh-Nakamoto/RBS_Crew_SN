upstream nextjs {
    server nextjs-web:3000;
    keepalive 32;
}

# Le backend est un service Go nommé `api-go` dans docker-compose (l'ancien nom
# `nestjs-api` n'existe plus).
upstream api_go {
    server api-go:4000;
    keepalive 32;
}

# HTTP : uniquement le challenge ACME et la redirection vers HTTPS.
server {
    listen 80;
    server_name rbs-crew.cheikhmodiouf.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name rbs-crew.cheikhmodiouf.org;

    ssl_certificate     /etc/letsencrypt/live/rbs-crew.cheikhmodiouf.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rbs-crew.cheikhmodiouf.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Webhooks de paiement — proxy direct vers l'API.
    # Ces routes sont montées à la RACINE du routeur Go (voir router.go), pas
    # derrière un préfixe : les providers appellent /payments/webhook/naboo, etc.
    # Sans ce bloc, ils tomberaient sur Next.js et ne seraient jamais reçus.
    # Pas de limit_req : un provider qui rejoue ses webhooks ne doit pas être
    # throttlé — la déduplication est faite côté service, via Redis.
    location /payments/webhook/ {
        client_max_body_size 1m;

        proxy_pass http://api_go;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirections SEO héritées de WordPress (map alimentée par les scripts de migration).
    if ($new_uri != "") {
        return 301 $new_uri;
    }

    location ~* ^/(wp-admin|wp-login\.php|xmlrpc\.php) {
        return 301 https://academy.rbs-crew.cheikhmodiouf.org$request_uri;
    }

    # Assets Next.js (cache agressif).
    location /_next/static/ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /_next/image {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=86400";
    }

    # Tout le reste → Next.js, qui proxifie lui-même /backend/* vers api-go
    # (rewrite déclaré dans next.config.ts). Les appels API du navigateur passent
    # donc par ici, ce qui les garde en même origine — indispensable pour que le
    # cookie de panier invité soit transmis.
    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
