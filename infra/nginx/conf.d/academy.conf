# Reverse proxy to WordPress academic site
# In production, replace the proxy_pass with the actual WordPress server address

server {
    listen 80;
    server_name academy.domaine.com;

    location / {
        # If WordPress is on external managed hosting, proxy to its IP/domain:
        # proxy_pass https://old-wordpress-host.example.com;
        # proxy_ssl_server_name on;

        # If WordPress runs as a Docker container on the same host:
        # proxy_pass http://wordpress:80;

        # Placeholder: return 502 until WordPress backend is configured
        return 502;
    }
}
