server {
    listen 80;
    server_name www.domaine.com domaine.com;

    # 1. Route academic traffic to the separate WP hosting
    location ^~ /academy/ {
        # Using temporary domain for testing, original was academy.domaine.com
        return 301 https://academy.domaine.com$request_uri;
    }

    # 2. Proxy API traffic to NestJS
    location /api/ {
        proxy_pass http://nestjs-api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addrs;
    }

    # 3. Proxy everything else to Next.js Web App
    location / {
        proxy_pass http://nextjs-web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addrs;
    }
}
