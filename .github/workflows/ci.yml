name: CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-frontend:
    name: Build Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx turbo run build --filter=web

  build-backend:
    name: Build Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-go

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'apps/api-go/go.mod'
          cache-dependency-path: apps/api-go/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      # Les tests d'intégration démarrent un conteneur Postgres (testcontainers)
      # et appliquent sql/schema.sql. Sans cette étape, ils ne sont jamais
      # exécutés — c'est ce qui avait laissé passer des tests écrits contre un
      # schéma inexistant.
      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build -v ./cmd/api

  build-and-push-docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build and push Backend (api-go)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api-go/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/rbs-crew-api-go:main

      - name: Build and push Frontend (nextjs-web)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/rbs-crew-nextjs-web:main
          # Variables NEXT_PUBLIC_* : figées au build. C'est cette image que
          # Jenkins déploie, donc les passer ici est indispensable — les
          # build.args de docker-compose ne servent qu'aux builds locaux.
          build-args: |
            NEXT_PUBLIC_API_URL=/backend
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL || 'https://rbs-crew.cheikhmodiouf.org' }}
