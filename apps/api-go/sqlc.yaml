version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/sql/"
    schema: "sql/schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/db/queries"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "pg_catalog.numeric"
            go_type:
              import: "github.com/shopspring/decimal"
              package: "decimal"
              type: "Decimal"
          - db_type: "pg_catalog.numeric"
            nullable: true
            go_type:
              import: "github.com/shopspring/decimal"
              package: "decimal"
              type: "NullDecimal"
