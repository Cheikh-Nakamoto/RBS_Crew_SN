  contact: {}
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_Cheikh-Nakamoto_RBS_Crew_SN_apps_api-go_internal_model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Cheikh-Nakamoto_RBS_Crew_SN_apps_api-go_internal_model.TokenPair'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Cheikh-Nakamoto_RBS_Crew_SN_apps_api-go_internal_types.AppError'
      summary: Login and receive JWT tokens
      tags:
      - Auth
  /auth/logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Logout (revoke all sessions)
      tags:
      - Auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Cheikh-Nakamoto_RBS_Crew_SN_apps_api-go_internal_model.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Cheikh-Nakamoto_RBS_Crew_SN_apps_api-go_internal_types.AppError'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_Cheikh-Nakamoto_RBS_Crew_SN_apps_api-go_internal_model.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_Cheikh-Nakamoto_RBS_Crew_SN_apps_api-go_internal_model.TokenPair'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_Cheikh-Nakamoto_RBS_Crew_SN_apps_api-go_internal_types.AppError'
      summary: Refresh access token using refresh token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_Cheikh-Nakamoto_RBS_Crew_SN_apps_api-go_internal_model.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_Cheikh-Nakamoto_RBS_Crew_SN_apps_api-go_internal_model.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_Cheikh-Nakamoto_RBS_Crew_SN_apps_api-go_internal_types.AppError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_Cheikh-Nakamoto_RBS_Crew_SN_apps_api-go_internal_types.AppError'
      summary: Register a new user
      tags:
      - Auth
  /auth/session:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Check session
      tags:
      - Auth
